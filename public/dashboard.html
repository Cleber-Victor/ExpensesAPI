<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker | Painel</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

  <div class="dashboard-container">
    
    <nav class="navbar">
      <div class="navbar-brand">
        <i class="ph-fill ph-wallet" style="color: var(--primary);"></i>
        Expense<span style="font-weight: 300;">Tracker</span>
      </div>
      <div class="user-controls">
        <span id="user-greeting" style="color: var(--text-muted);">Olá, Usuário</span>
        <button id="logout-btn" class="btn btn-secondary">
          <i class="ph ph-sign-out"></i> Sair
        </button>
      </div>
    </nav>

    <div class="stats-grid">
      <div class="stat-card glass">
        <div class="stat-title">Gasto Total</div>
        <div class="stat-value text-gradient" id="total-spend">R$0,00</div>
      </div>
      <div class="stat-card glass">
        <div class="stat-title">Quantidade de Despesas</div>
        <div class="stat-value" id="expenses-count">0</div>
      </div>
    </div>

    <section class="expenses-section glass" style="padding: 1.5rem;">
      <div class="section-header">
        <h2>Suas Despesas</h2>
        
        <div class="filters">
          <select id="filter-select" class="form-control">
            <option value="">Todo o Período</option>
            <option value="past_week">Última Semana</option>
            <option value="past_month">Último Mês</option>
            <option value="last_3_months">Últimos 3 Meses</option>
          </select>
          
          <button id="add-expense-btn" class="btn btn-primary">
            <i class="ph ph-plus"></i> Adicionar Despesa
          </button>
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Descrição</th>
              <th>Categoria</th>
              <th>Valor</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="expenses-table-body">
            <!-- Populated via JS -->
          </tbody>
        </table>
      </div>
      
      <div id="empty-state" class="empty-state hidden">
        <i class="ph ph-receipt" style="font-size: 4rem;"></i>
        <h3>Nenhuma despesa encontrada</h3>
        <p>Você não registrou nenhum gasto neste período.</p>
      </div>
    </section>
  </div>

  <!-- Add Expense Modal -->
  <div id="expense-modal" class="modal-overlay">
    <div class="modal glass">
      <div class="modal-header">
        <h2 id="modal-title">Adicionar Despesa</h2>
        <button class="close-btn" id="close-modal"><i class="ph ph-x"></i></button>
      </div>
      
      <form id="expense-form">
        <div class="form-group">
          <label>Descrição</label>
          <input type="text" id="exp-desc" class="form-control" required placeholder="ex: Compra do Mês">
        </div>
        
        <div style="display: flex; gap: 1rem;">
          <div class="form-group" style="flex: 1;">
            <label>Valor</label>
            <input type="number" step="0.01" min="0.01" id="exp-amount" class="form-control" required placeholder="0.00">
          </div>
          <div class="form-group" style="flex: 1;">
            <label>Data</label>
            <input type="date" id="exp-date" class="form-control" required>
          </div>
        </div>

        <div class="form-group">
          <label>Categoria</label>
          <select id="exp-category" class="form-control" required>
            <option value="Groceries">Supermercado</option>
            <option value="Leisure">Lazer</option>
            <option value="Electronics">Eletrônicos</option>
            <option value="Utilities">Contas Básicas</option>
            <option value="Clothing">Roupas</option>
            <option value="Health">Saúde</option>
            <option value="Others">Outros</option>
          </select>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="cancel-modal">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar Despesa</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="/js/utils.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
