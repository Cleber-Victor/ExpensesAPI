<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker | Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

  <div class="dashboard-container">
    
    <nav class="navbar">
      <div class="navbar-brand">
        <i class="ph-fill ph-wallet" style="color: var(--primary);"></i>
        Expense<span style="font-weight: 300;">Tracker</span>
      </div>
      <div class="user-controls">
        <span id="user-greeting" style="color: var(--text-muted);">Hello, User</span>
        <button id="logout-btn" class="btn btn-secondary">
          <i class="ph ph-sign-out"></i> Logout
        </button>
      </div>
    </nav>

    <div class="stats-grid">
      <div class="stat-card glass">
        <div class="stat-title">Total Spend</div>
        <div class="stat-value text-gradient" id="total-spend">$0.00</div>
      </div>
      <div class="stat-card glass">
        <div class="stat-title">Expenses Count</div>
        <div class="stat-value" id="expenses-count">0</div>
      </div>
    </div>

    <section class="expenses-section glass" style="padding: 1.5rem;">
      <div class="section-header">
        <h2>Your Expenses</h2>
        
        <div class="filters">
          <select id="filter-select" class="form-control">
            <option value="">All Time</option>
            <option value="past_week">Past Week</option>
            <option value="past_month">Past Month</option>
            <option value="last_3_months">Last 3 Months</option>
          </select>
          
          <button id="add-expense-btn" class="btn btn-primary">
            <i class="ph ph-plus"></i> Add Expense
          </button>
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Description</th>
              <th>Category</th>
              <th>Amount</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="expenses-table-body">
            <!-- Populated via JS -->
          </tbody>
        </table>
      </div>
      
      <div id="empty-state" class="empty-state hidden">
        <i class="ph ph-receipt" style="font-size: 4rem;"></i>
        <h3>No expenses found</h3>
        <p>You haven't added any expenses for this period yet.</p>
      </div>
    </section>
  </div>

  <!-- Add Expense Modal -->
  <div id="expense-modal" class="modal-overlay">
    <div class="modal glass">
      <div class="modal-header">
        <h2 id="modal-title">Add Expense</h2>
        <button class="close-btn" id="close-modal"><i class="ph ph-x"></i></button>
      </div>
      
      <form id="expense-form">
        <div class="form-group">
          <label>Description</label>
          <input type="text" id="exp-desc" class="form-control" required placeholder="e.g. Netflix Subscription">
        </div>
        
        <div style="display: flex; gap: 1rem;">
          <div class="form-group" style="flex: 1;">
            <label>Amount (positive)</label>
            <input type="number" step="0.01" min="0.01" id="exp-amount" class="form-control" required placeholder="0.00">
          </div>
          <div class="form-group" style="flex: 1;">
            <label>Date</label>
            <input type="date" id="exp-date" class="form-control" required>
          </div>
        </div>

        <div class="form-group">
          <label>Category</label>
          <select id="exp-category" class="form-control" required>
            <option value="Groceries">Groceries</option>
            <option value="Leisure">Leisure</option>
            <option value="Electronics">Electronics</option>
            <option value="Utilities">Utilities</option>
            <option value="Clothing">Clothing</option>
            <option value="Health">Health</option>
            <option value="Others">Others</option>
          </select>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="cancel-modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Expense</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="/js/utils.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
